openapi: 3.1.0
info:
  title: Hostaway Calendar Reservation Fees API
  description: 'Read and update availability and nightly pricing on the Hostaway listing

    calendar. Supports per-day retrieval, batch updates, and embedded

    reservation context via the includeResources query parameter.

    '
  version: 1.0.0
  contact:
    name: Hostaway Support
    email: support@hostaway.com
    url: https://api.hostaway.com/documentation
  x-logo:
    url: https://www.hostaway.com/favicon.ico
servers:
- url: https://api.hostaway.com/v1
  description: Production API
security:
- OAuth2ClientCredentials: []
tags:
- name: Reservation Fees
  description: Fees applied to a reservation
paths:
  /reservations/{reservationId}/fees:
    parameters:
    - $ref: '#/components/parameters/ReservationId'
    get:
      summary: Hostaway List Reservation Fees
      operationId: listReservationFees
      tags:
      - Reservation Fees
      responses:
        '200':
          description: Fees collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
components:
  schemas:
    StandardResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - fail
        result:
          type: object
  parameters:
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema:
        type: integer
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.hostaway.com/v1/accessTokens
          scopes:
            general: General API access scope
