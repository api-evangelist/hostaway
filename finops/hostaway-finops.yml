specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Hostaway
providerId: hostaway
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - FinOps
  - SaaS
  - Vacation Rentals
description: |
  FOCUS-aligned FinOps definition for the Hostaway vacation rental management
  SaaS. Hostaway is sold as a per-listing subscription with quote-based pricing,
  not a usage-metered API. The primary cost driver is the number of active
  listings under management; channel commissions are paid by the property
  manager to the OTA, not to Hostaway.
sources:
  - https://www.hostaway.com/pricing/
  - https://api.hostaway.com/documentation
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Hostaway
serviceCategory: Software as a Service
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
  primaryUnit: listing
  secondaryUnits:
    - reservation
focusColumns:
  ServiceName: Hostaway Property Management
  ServiceCategory: Software as a Service
  ProviderName: Hostaway
  PublisherName: Hostaway
  InvoiceIssuerName: Hostaway
  PricingCategory: Subscription
  PricingUnit: listing/month
  BillingCurrency: USD
meters:
  - name: active_listings
    unit: listing
    aggregation: max
    dimensions:
      - account
      - month
  - name: reservations_processed
    unit: reservation
    aggregation: sum
    dimensions:
      - account
      - listing
      - channel
notes:
  - Hostaway publishes no public unit rates; quotes are issued after a sales conversation.
  - OTA commissions (Airbnb, Vrbo, Booking.com, etc.) are paid by the property manager to the channel, not Hostaway.
  - The Hostaway public API itself is included in the platform subscription; there is no separate per-call API charge.
